<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowLands</title>
    <link rel="stylesheet" href="src/styles/reset.css">
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="shortcut icon" href="favicon.ico">
</head>

<body>
    <header>
        <div class="container">
            <div class="header">
                <div class="logo">
                    <img src="" alt="">
                    <a href=" ">ShadowLands</a>
                </div>
                <div class="nav">
                    <a href="#home">Главная</a>
                    <a href="#towns">Города</a>
                    <a href="#shops">Магазины</a>
                    <a href="#jobs">Работа</a>
                    <a href="#news">Новости</a>
                </div>
                <div id="account">
                    <button onclick="openLoginModal()">Войти</button>
                </div>
            </div>
        </div>
    </header>
    <main class="main" id="home">
        <img src="src/images/intro.jpg" style="pointer-events: none; user-select: none;">
    </main>

    <section id="towns">
        <div class="container">
            <h2 class="section-title">Города</h2>
            <div class="towns"></div>
        </div>
    </section>
    
    <section id="shops">
        <div class="container">
            <h2 class="section-title">Магазины</h2>
            <div class="shop-categories" style="overflow: auto;"></div>
            <div class="shops"></div>
        </div>
    </section>
    
    <section id="jobs">
        <div class="container">
            <h2 class="section-title">Работа</h2>
            <div class="shop-categories"></div>
            <div class="shops"></div>
        </div>
    </section>
    
    <section id="news">
        <div class="container">
            <h2 class="section-title">Новости</h2>
            <div class="shop-categories"></div>
            <div class="shops"></div>
        </div>
    </section>

    <div class="modal hide"></div>

    <footer>
        <div class="container">
            <div class="footer">
                <p>asdasdasd</p>
                <p>asdasdasd</p>
                <p>asdasdasd</p>
                <p>asdasdasd</p>
                <p>asdasdasd</p>
                <p>asdasdasd</p>
                <p>Все права защищены.</p>
                <p>ShadowLands 2026.</p>
            </div>
        </div>
    </footer>
</body>
<script>
    const scripts = ["towns", "auth", "shops"];

    scripts.forEach(script => {
        const _script = document.createElement("script");
        _script.src = `src/scripts/${script}.js`;
        document.body.appendChild(_script);
    });
</script>
</html>
